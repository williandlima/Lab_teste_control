name: CI
on:
  push:
    branches: [main, "claude/*"]
  pull_request:

jobs:
  test:
    name: Testes unitários (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Instala libs do sistema (PySide6 exige libGL/libEGL no Ubuntu headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libfontconfig1 libdbus-1-3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Instala dependências Python
        run: pip install -r requirements.txt
      - name: Roda testes (sem GUI — sem display no CI)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -m "not gui" -q --tb=short
